<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Rides - tripZo Rider</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar with user info -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-car"></i>
                <span>tripZo Rider</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="book-ride.html" class="nav-link">Book Ride</a>
                <a href="my-rides.html" class="nav-link active">My Rides</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <div class="user-info" id="userInfo" style="display: none;">
                    <span id="userName"></span>
                    <a href="#" id="logoutBtn" class="btn-logout">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="rides-section">
        <div class="container">
            <h2>My Rides</h2>
            <div class="rides-filter">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="upcoming">Upcoming</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="cancelled">Cancelled</button>
            </div>
            <div class="rides-list" id="ridesList">
                <!-- Rides will be loaded here -->
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
