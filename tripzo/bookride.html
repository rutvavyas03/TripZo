<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ride - tripZo Rider</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <!-- Navbar with user info if logged in -->
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-car"></i>
                <span>tripZo Rider</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="book-ride.html" class="nav-link active">Book Ride</a>
                <a href="my-rides.html" class="nav-link">My Rides</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <div class="user-info" id="userInfo" style="display: none;">
                    <span id="userName"></span>
                    <a href="#" id="logoutBtn" class="btn-logout">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="booking-section">
        <div class="container">
            <div class="booking-card">
                <h2>Where to?</h2>
                <form id="bookingForm" class="booking-form">
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Pickup Location</label>
                        <input type="text" id="pickup" placeholder="Current location" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-flag-checkered"></i> Destination</label>
                        <input type="text" id="destination" placeholder="Where to?" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="rideDate" required>
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="rideTime" required>
                        </div>
                    </div>
                    <div class="ride-options">
                        <h4>Choose Ride Type</h4>
                        <div class="ride-type-grid">
                            <label class="ride-type">
                                <input type="radio" name="rideType" value="economy" checked>
                                <div class="ride-type-card">
                                    <i class="fas fa-car"></i>
                                    <h5>Economy</h5>
                                    <p>$200</p>
                                </div>
                            </label>
                            <label class="ride-type">
                                <input type="radio" name="rideType" value="comfort">
                                <div class="ride-type-card">
                                    <i class="fas fa-couch"></i>
                                    <h5>Comfort</h5>
                                    <p>$250</p>
                                </div>
                            </label>
                            <label class="ride-type">
                                <input type="radio" name="rideType" value="luxury">
                                <div class="ride-type-card">
                                    <i class="fas fa-crown"></i>
                                    <h5>Luxury</h5>
                                    <p>$500</p>
                                </div>
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary full-width" id="bookBtn" disabled>Login to Book Ride</button>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
